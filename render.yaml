# Render Blueprint: connect this repo at https://dashboard.render.com → New → Blueprint
# CPU only (no GPU). Topic search works with zero keys. For Ask: set GROQ_API_KEY or OPENAI_API_KEY
# (Ollama does not run on Render’s host). DAMA_USE_OLLAMA=0 skips dead localhost Ollama.
services:
  - type: web
    name: dama-topic-search
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements-web.txt
    startCommand: uvicorn topic_search_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DAMA_USE_OLLAMA
        value: "0"
      - key: PYTHON_VERSION
        value: "3.12.3"
      # Add in the dashboard (secret) — do not commit keys:
      # GROQ_API_KEY or OPENAI_API_KEY
      # Optional: DAMA_GROQ_MODEL, DAMA_CHAT_MODEL
