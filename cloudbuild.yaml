steps:
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "${_IMAGE_URI}", "."]
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_IMAGE_URI}"]
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "${_SERVICE}",
        "--image",
        "${_IMAGE_URI}",
        "--region",
        "${_REGION}",
        "--allow-unauthenticated",
        "--set-env-vars",
        "DAMA_USE_VERTEX=1,GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_REGION=${_REGION},DAMA_DATA_GCS_URI=${_DAMA_DATA_GCS_URI},DAMA_MAX_OUTPUT_TOKENS=${_DAMA_MAX_OUTPUT_TOKENS}",
      ]

substitutions:
  _REGION: "us-central1"
  _SERVICE: "dama"
  _DAMA_DATA_GCS_URI: "gs://dama-492316-an-data-9690/data/an/"
  _DAMA_MAX_OUTPUT_TOKENS: "384"
  # Set _IMAGE_URI at submit time, example:
  #   gcloud builds submit --substitutions=_IMAGE_URI=us-central1-docker.pkg.dev/PROJECT/dama/dama:TAG
  _IMAGE_URI: ""

images:
  - "${_IMAGE_URI}"

