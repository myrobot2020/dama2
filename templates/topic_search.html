<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DAMA — AN Books 4–11</title>
  <style>
    :root {
      --bg: #141518;
      --surface: #1e1f24;
      --panel: #25262d;
      --text: #e8e9ed;
      --muted: #8b909a;
      --accent: #c9a227;
      --accent-dim: #8a7020;
      --border: #3d3f48;
      --chat-user: #2a2d36;
      --bot-strip: #1a1c22;
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
    }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.45;
    }
    .top-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.3rem 0.55rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .top-bar .brand {
      margin: 0;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--accent);
      flex-shrink: 0;
    }
    .top-bar .bot-strip {
      flex: 1;
      min-width: 0;
      padding: 0.15rem 0;
      background: transparent;
      border: 0;
      font-size: 0.76rem;
      color: var(--text);
      line-height: 1.35;
    }
    .top-bar .bot-strip.empty { color: var(--muted); }
    .top-bar .row-meta {
      font-size: 0.62rem;
      color: var(--muted);
      flex-shrink: 0;
      max-width: 11rem;
      text-align: right;
      line-height: 1.25;
    }
    .workspace {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      min-height: 0;
      border-top: 0;
    }
    @media (max-width: 900px) {
      .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(42vh, 1fr) minmax(42vh, 1fr);
      }
    }
    .pane-left {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-width: 0;
      min-height: 0;
      border-right: 1px solid var(--border);
    }
    @media (max-width: 900px) {
      .pane-left { border-right: 0; border-bottom: 1px solid var(--border); }
    }
    @media (max-width: 640px) {
      .pane-left { grid-template-columns: 1fr; grid-template-rows: minmax(0, 1fr) minmax(0, 1fr); }
    }
    .pane-chat {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--surface);
    }
    .chains-area {
      padding: 0.4rem 0.5rem;
      overflow: auto;
      overflow-x: hidden;
      border-right: 1px solid var(--border);
      min-width: 0;
      min-height: 0;
    }
    @media (max-width: 640px) {
      .chains-area { border-right: 0; border-bottom: 1px solid var(--border); }
    }
    .columns {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(7.5rem, 1fr));
      gap: 0.35rem;
      align-items: start;
      min-width: 0;
    }
    .column {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.35rem 0.35rem 0.4rem;
      min-height: 0;
      min-width: 0;
      max-width: none;
      width: 100%;
    }
    .column-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      padding: 0.15rem 0.2rem 0.3rem;
      line-height: 1.2;
      text-transform: none;
      letter-spacing: 0;
    }
    .column-ids {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-wrap: wrap;
      padding: 0 0.15rem 0.35rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.25rem;
    }
    .book-badge {
      font-size: 0.65rem;
      padding: 0.12rem 0.35rem;
      border-radius: 4px;
      background: #333;
      color: var(--muted);
    }
    .sutta-id-txt { font-size: 0.8rem; font-weight: 600; color: var(--text); }
    .chain-node {
      padding: 0.12rem 0.2rem;
      font-size: 0.78rem;
      line-height: 1.35;
      word-break: break-word;
      text-align: left;
    }
    .chain-arrow {
      text-align: center;
      color: var(--accent-dim);
      font-size: 0.85rem;
      line-height: 1;
      padding: 0 0 0.08rem;
      user-select: none;
    }
    .info-btn {
      width: 1.45rem;
      height: 1.45rem;
      border-radius: 50%;
      border: 1px solid var(--accent-dim);
      background: transparent;
      color: var(--accent);
      font-size: 0.68rem;
      font-weight: 700;
      font-style: italic;
      cursor: pointer;
      line-height: 1;
      padding: 0;
      flex-shrink: 0;
    }
    .info-btn:hover { background: rgba(201, 162, 39, 0.2); }
    .column.selected { box-shadow: 0 0 0 2px var(--accent-dim); }
    .detail-panel {
      padding: 0.4rem 0.5rem;
      overflow: auto;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      min-height: 0;
      min-width: 0;
    }
    .detail-panel h2 {
      margin: 0;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .detail-panel .body {
      font-size: 0.8rem;
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--panel);
      padding: 0.45rem 0.55rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      flex: 1;
      min-height: 5rem;
      overflow: auto;
    }
    .detail-placeholder { color: var(--muted); font-size: 0.88rem; font-style: italic; }
    .detail-panel .commentary-body {
      flex: 1;
      min-height: 3.5rem;
      max-height: min(36vh, 18rem);
    }
    .chat-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border: 0;
      background: var(--surface);
    }
    .chat-transcript {
      flex: 1;
      overflow: auto;
      padding: 0.45rem 0.55rem;
      min-height: 3rem;
    }
    .msg { margin-bottom: 0.55rem; font-size: 0.86rem; }
    .msg .who { font-size: 0.68rem; color: var(--muted); margin-bottom: 0.15rem; }
    .msg.user .bubble { background: var(--chat-user); padding: 0.4rem 0.6rem; border-radius: 6px; border: 1px solid var(--border); }
    .msg.assistant .bubble { background: var(--panel); padding: 0.4rem 0.6rem; border-radius: 6px; border: 1px solid var(--border); white-space: pre-wrap; }
    .msg.error .bubble { border-color: #8b4a4a; color: #e8a0a0; }
    .suggestion-list {
      margin-top: 0.45rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .suggestion-list .sl-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .suggestion-chips {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.3rem;
    }
    .suggestion-chip {
      text-align: left;
      font-size: 0.78rem;
      line-height: 1.35;
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
    }
    .suggestion-chip:hover {
      border-color: var(--accent-dim);
      background: rgba(201, 162, 39, 0.12);
    }
    .footer-bar {
      padding: 0.4rem 0.55rem 0.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      flex-shrink: 0;
    }
    .footer-meta { display: none; }
    .footer-form {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }
    .footer-form .field {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .footer-form label.hint {
      font-size: 0.72rem;
      color: var(--muted);
    }
    .footer-form textarea {
      width: 100%;
      min-height: 2.4rem;
      max-height: 7rem;
      padding: 0.45rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      resize: vertical;
    }
    .footer-form button {
      padding: 0.45rem 1rem;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: #1a1508;
      font-weight: 600;
      cursor: pointer;
      height: fit-content;
    }
    .footer-form button:disabled { opacity: 0.45; cursor: not-allowed; }
    .warn-banner {
      background: #3a3020;
      color: #e8c96b;
      padding: 0.25rem 0.55rem;
      font-size: 0.72rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .empty-chains { color: var(--muted); font-size: 0.85rem; padding: 1rem; text-align: center; }
    .search-bar {
      display: flex;
      gap: 0.35rem;
      align-items: flex-end;
      margin-bottom: 0.4rem;
      flex-shrink: 0;
    }
    .search-bar .field {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      min-width: 0;
    }
    .search-bar label.hint {
      font-size: 0.68rem;
      color: var(--muted);
    }
    .search-bar input[type="text"] {
      width: 100%;
      padding: 0.35rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
    }
    .search-bar button {
      padding: 0.35rem 0.65rem;
      border: none;
      border-radius: 4px;
      background: var(--accent);
      color: #1a1508;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.78rem;
      flex-shrink: 0;
    }
    .search-bar button:disabled { opacity: 0.45; cursor: not-allowed; }
    .msg.starters .bubble { font-size: 0.8rem; color: var(--muted); background: transparent; border-style: dashed; }
  </style>
</head>
<body>
  <header class="top-bar">
    <h1 class="brand">DAMA</h1>
    <div class="bot-strip empty" id="bot-strip">AN 4–11 topic search — no API key. Ask needs Ollama or Groq/OpenAI.</div>
    <span class="row-meta" id="row-meta"></span>
  </header>
  <div id="key-banner" class="warn-banner" style="display:none;"></div>
  <div class="workspace">
    <div class="pane-left">
      <div class="chains-area">
        <form class="search-bar" id="search-form" action="#" autocomplete="off">
          <div class="field">
            <label class="hint" for="search-input">Topic search — Enter or Search</label>
            <input type="text" id="search-input" placeholder="e.g. faith, jhana…" />
          </div>
          <button type="submit" id="search-submit">Search</button>
        </form>
        <div class="columns" id="columns"></div>
        <div class="empty-chains" id="empty-chains" style="display:none;">No matches with extracted chains. Try other words.</div>
      </div>
      <aside class="detail-panel">
        <h2>Sutta (reading)</h2>
        <div class="body detail-placeholder" id="panel-sutta">Click (i) beside a sutta id to show text here.</div>
        <h2>Teacher commentary</h2>
        <div class="body commentary-body detail-placeholder" id="panel-commentary">Select a result column to see commentary.</div>
      </aside>
    </div>
    <div class="pane-chat">
      <div class="chat-wrap">
        <div class="chat-transcript" id="chat-transcript"></div>
        <div class="footer-bar">
          <form class="footer-form" id="ask-form" action="#" autocomplete="off">
            <div class="field">
              <label class="hint" for="ask-input">Ask DAMA about the current results — Enter sends, Shift+Enter newline.</label>
              <textarea id="ask-input" rows="2" placeholder="Your question…" autocomplete="off"></textarea>
            </div>
            <button type="submit" id="ask-submit">Send</button>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script>
(function () {
  const columnsEl = document.getElementById('columns');
  const botStrip = document.getElementById('bot-strip');
  const emptyChains = document.getElementById('empty-chains');
  const panelSutta = document.getElementById('panel-sutta');
  const panelComm = document.getElementById('panel-commentary');
  const searchInput = document.getElementById('search-input');
  const searchForm = document.getElementById('search-form');
  const searchSubmit = document.getElementById('search-submit');
  const askInput = document.getElementById('ask-input');
  const askForm = document.getElementById('ask-form');
  const askSubmit = document.getElementById('ask-submit');
  const chatTranscript = document.getElementById('chat-transcript');
  const keyBanner = document.getElementById('key-banner');
  const rowMeta = document.getElementById('row-meta');

  let state = {
    top: [],
    query: '',
    selectedCol: -1,
    chatAvailable: false,
    chatHistory: [],
  };

  function escapeHtml(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function setPanel(hit) {
    if (!hit) {
      panelSutta.classList.add('detail-placeholder');
      panelSutta.textContent = 'Click (i) beside a sutta id to show text here.';
      panelComm.classList.add('detail-placeholder');
      panelComm.innerHTML = '';
      panelComm.textContent = 'Select a result column to see commentary.';
      return;
    }
    panelSutta.classList.remove('detail-placeholder');
    panelSutta.innerHTML = escapeHtml(hit.sutta || '');
    const c = (hit.commentary || '').trim();
    if (c) {
      panelComm.classList.remove('detail-placeholder');
      panelComm.innerHTML = escapeHtml(c);
    } else {
      panelComm.classList.add('detail-placeholder');
      panelComm.textContent =
        'No separate teacher commentary excerpt is stored for this sutta in the processed JSON (reading text may still include explanation).';
    }
  }

  function selectColumn(colIdx) {
    state.selectedCol = colIdx;
    const hit = state.top[colIdx];
    setPanel(hit);
    document.querySelectorAll('.column').forEach((c, i) => {
      c.classList.toggle('selected', i === colIdx);
    });
  }

  function renderColumns(data) {
    columnsEl.innerHTML = '';
    state.top = data.top || [];
    state.query = data.query || '';
    const top = state.top;
    if (!top.length) {
      emptyChains.style.display = 'block';
      botStrip.textContent = data.bot_summary || 'No results.';
      botStrip.classList.add('empty');
      state.selectedCol = -1;
      setPanel(null);
      return;
    }
    emptyChains.style.display = 'none';
    botStrip.textContent = data.bot_summary || '';
    botStrip.classList.remove('empty');

    top.forEach((hit, colIdx) => {
      const col = document.createElement('div');
      col.className = 'column';
      col.dataset.col = String(colIdx);

      const titleEl = document.createElement('div');
      titleEl.className = 'column-title';
      titleEl.textContent = hit.title || 'Chain';
      col.appendChild(titleEl);

      const ids = document.createElement('div');
      ids.className = 'column-ids';
      if (hit.book != null && hit.book !== '') {
        const b = document.createElement('span');
        b.className = 'book-badge';
        b.textContent = 'AN' + hit.book;
        ids.appendChild(b);
      }
      const sid = document.createElement('span');
      sid.className = 'sutta-id-txt';
      sid.textContent = String(hit.sutta_id || '?');
      ids.appendChild(sid);
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'info-btn';
      btn.setAttribute('aria-label', 'Show this sutta in the reading pane');
      btn.textContent = 'i';
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        selectColumn(colIdx);
      });
      ids.appendChild(btn);
      col.appendChild(ids);

      const items = (hit.chain && hit.chain.items) ? hit.chain.items : [];
      items.forEach((label, nodeIdx) => {
        const node = document.createElement('div');
        node.className = 'chain-node';
        node.textContent = typeof label === 'string' ? label : String(label);
        col.appendChild(node);
        if (nodeIdx < items.length - 1) {
          const ar = document.createElement('div');
          ar.className = 'chain-arrow';
          ar.textContent = '↓';
          col.appendChild(ar);
        }
      });
      columnsEl.appendChild(col);
    });
    selectColumn(0);
  }

  function priorUserMessagesForStarters() {
    return state.chatHistory
      .filter(function (m) { return m.role === 'user'; })
      .map(function (m) { return m.content; })
      .slice(-5);
  }

  function removeStarterMessages() {
    chatTranscript.querySelectorAll('.msg.starters').forEach(function (el) {
      el.remove();
    });
  }

  function appendSearchStarters(questions) {
    if (!questions || !questions.length) return;
    removeStarterMessages();
    const wrap = document.createElement('div');
    wrap.className = 'msg assistant starters';
    const who = document.createElement('div');
    who.className = 'who';
    who.textContent = 'DAMA';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = 'About this search — tap a question to ask:';
    wrap.appendChild(who);
    wrap.appendChild(bubble);
    const list = document.createElement('div');
    list.className = 'suggestion-list';
    const chips = document.createElement('div');
    chips.className = 'suggestion-chips';
    questions.forEach(function (q) {
      const s = String(q || '').trim();
      if (!s) return;
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'suggestion-chip';
      b.setAttribute('aria-label', 'Ask: ' + s);
      b.textContent = s;
      b.addEventListener('click', function () {
        runAskFromInput(s);
      });
      chips.appendChild(b);
    });
    if (!chips.childNodes.length) return;
    list.appendChild(chips);
    wrap.appendChild(list);
    chatTranscript.appendChild(wrap);
    chatTranscript.scrollTop = chatTranscript.scrollHeight;
  }

  async function fetchSearchStarters(query, data) {
    if (!state.chatAvailable || !data.top || !data.top.length) return;
    const suttaIds = data.top.slice(0, 8).map(function (h) { return String(h.sutta_id || ''); });
    try {
      const res = await fetch('/api/search_starters', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          query: query,
          sutta_ids: suttaIds,
          prior_user_messages: priorUserMessagesForStarters(),
        }),
      });
      const payload = await res.json().catch(function () { return {}; });
      const qs = Array.isArray(payload.questions) ? payload.questions : [];
      appendSearchStarters(qs);
    } catch (e) {
      /* ignore */
    }
  }

  async function runSearchFromInput() {
    const q = searchInput.value.trim();
    if (!q) return;
    const url = '/?q=' + encodeURIComponent(q);
    window.history.pushState({}, '', url);
    searchSubmit.disabled = true;
    try {
      const res = await fetch('/api/search?q=' + encodeURIComponent(q));
      const data = await res.json();
      renderColumns(data);
      await fetchSearchStarters(q, data);
    } finally {
      searchSubmit.disabled = false;
    }
  }

  async function loadSearchFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q') || '';
    searchInput.value = q;
    if (!q.trim()) {
      botStrip.textContent = 'Use topic search on the left; chat on the right — history is kept across searches.';
      botStrip.classList.add('empty');
      columnsEl.innerHTML = '';
      emptyChains.style.display = 'none';
      state.top = [];
      state.selectedCol = -1;
      setPanel(null);
      return;
    }
    const res = await fetch('/api/search?q=' + encodeURIComponent(q));
    const data = await res.json();
    renderColumns(data);
    await fetchSearchStarters(q, data);
  }

  function contextForChat() {
    const topCtx = state.top.map((h) => ({
      sutta_id: h.sutta_id,
      sutta: h.sutta || '',
      commentary: h.commentary || '',
    }));
    if (state.selectedCol >= 0 && state.top[state.selectedCol]) {
      const h = state.top[state.selectedCol];
      return {
        context: {
          sutta_id: h.sutta_id,
          sutta: h.sutta || '',
          commentary: h.commentary || '',
        },
        top_context: topCtx,
      };
    }
    return { context: null, top_context: topCtx.length ? topCtx : null };
  }

  async function runAskFromInput(directText) {
    const fromField = directText === undefined || directText === null;
    const text = (fromField ? askInput.value : String(directText)).trim();
    if (!text) return;
    if (!state.top.length) {
      appendChat('assistant', 'Run a topic search first so DAMA has context.', true);
      return;
    }
    if (!state.chatAvailable) {
      appendChat('assistant', 'Topic search needs no API keys. For Ask: install Ollama (ollama.com), run it, then in a terminal: ollama pull qwen2.5:0.5b-instruct. On a host like Render, add a free Groq key (GROQ_API_KEY) — search still works without any key.', true);
      return;
    }
    appendChat('user', text, false);
    if (fromField) askInput.value = '';
    askSubmit.disabled = true;
    const { context, top_context } = contextForChat();
    const messages = state.chatHistory.concat([{ role: 'user', content: text }]);
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, context, top_context }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        let err = res.statusText || 'Request failed';
        if (data.detail !== undefined) {
          err = typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail);
        }
        appendChat('assistant', err, true);
        return;
      }
      const reply = data.reply || '';
      const suggestions = Array.isArray(data.suggestions) ? data.suggestions : [];
      appendAssistantMessage(reply, suggestions);
      state.chatHistory.push({ role: 'user', content: text });
      state.chatHistory.push({ role: 'assistant', content: reply });
      if (state.chatHistory.length > 20) {
        state.chatHistory = state.chatHistory.slice(-20);
      }
    } catch (err) {
      appendChat('assistant', String(err), true);
    } finally {
      askSubmit.disabled = false;
    }
  }

  function appendChat(role, text, isError) {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role + (isError ? ' error' : '');
    const who = document.createElement('div');
    who.className = 'who';
    who.textContent = role === 'user' ? 'You' : 'DAMA';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(who);
    wrap.appendChild(bubble);
    chatTranscript.appendChild(wrap);
    chatTranscript.scrollTop = chatTranscript.scrollHeight;
  }

  function appendAssistantMessage(text, suggestions) {
    const wrap = document.createElement('div');
    wrap.className = 'msg assistant';
    const who = document.createElement('div');
    who.className = 'who';
    who.textContent = 'DAMA';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(who);
    wrap.appendChild(bubble);
    if (suggestions && suggestions.length) {
      const list = document.createElement('div');
      list.className = 'suggestion-list';
      const lab = document.createElement('div');
      lab.className = 'sl-label';
      lab.textContent = 'Try next';
      list.appendChild(lab);
      const chips = document.createElement('div');
      chips.className = 'suggestion-chips';
      suggestions.forEach(function (q) {
        const s = String(q || '').trim();
        if (!s) return;
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'suggestion-chip';
        b.setAttribute('aria-label', 'Ask: ' + s);
        b.textContent = s;
        b.addEventListener('click', function () {
          runAskFromInput(s);
        });
        chips.appendChild(b);
      });
      if (chips.childNodes.length) list.appendChild(chips);
      if (list.querySelector('.suggestion-chip')) wrap.appendChild(list);
    }
    chatTranscript.appendChild(wrap);
    chatTranscript.scrollTop = chatTranscript.scrollHeight;
  }

  searchForm.addEventListener('submit', function (e) {
    e.preventDefault();
    runSearchFromInput();
  });

  askForm.addEventListener('submit', function (e) {
    e.preventDefault();
    runAskFromInput();
  });

  askInput.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter' || e.shiftKey) return;
    e.preventDefault();
    askForm.requestSubmit();
  });

  function setMetaLine(chatPart, rowsPart) {
    const bits = [];
    if (chatPart) bits.push(chatPart);
    if (rowsPart) bits.push(rowsPart);
    rowMeta.textContent = bits.join(' · ');
  }

  fetch('/api/config')
    .then((r) => r.json())
    .then((cfg) => {
      state.chatAvailable = !!cfg.chat_available;
      const chatPart = cfg.chat_available
        ? ('Ask: ' + (cfg.provider || '') + ' / ' + (cfg.model || ''))
        : 'Ask: off (no Ollama or cloud key)';
      if (!cfg.chat_available) {
        keyBanner.style.display = 'block';
        keyBanner.textContent = 'Topic search needs no API keys. For Ask DAMA: run Ollama locally (free) and pull a small model, or set GROQ_API_KEY / OPENAI_API_KEY on the server.';
      } else {
        keyBanner.style.display = 'none';
      }
      fetch('/health')
        .then((r) => r.json())
        .then((h) => {
          const rowsPart = h.rows ? h.rows + ' segments (AN 4–11)' : '';
          setMetaLine(chatPart, rowsPart);
        })
        .catch(() => setMetaLine(chatPart, ''));
    })
    .catch(() => setMetaLine('', ''));

  loadSearchFromUrl();
})();
  </script>
</body>
</html>
