# Build AN1+AN2 Vertex shards + manifest and upload to GCS (incremental-friendly; no Docker).
# Run workflow_dispatch after changing processed JSON, or rely on path filters on main.
# Deploy workflow no longer embeds on every push; set Cloud Run AN1_VERTEX_MANIFEST_GCS_URI to the manifest below.
#
name: Build Vertex corpus (shards)

on:
  workflow_dispatch: {}
  push:
    branches: ["main"]
    paths:
      - "processed scipts2/an1.json"
      - "processed scipts2/an2.json"
      - "an1_build_vertex_bundle.py"
      - "an1_build_index.py"
      - "an1_vertex_core.py"

permissions:
  contents: read
  id-token: write

jobs:
  build-corpus:
    name: Vertex shards + manifest
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: dama-492316
      REGION: us-central1
      UPLOAD_BASE: gs://dama-492316-an-data-9690/an1/vertex/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Install Python deps
        run: pip install --no-cache-dir -r requirements-an1-vertex.txt

      - name: Build and upload manifest + shards
        run: |
          export GOOGLE_CLOUD_PROJECT="${{ env.PROJECT_ID }}"
          export GOOGLE_CLOUD_REGION="${{ env.REGION }}"
          mkdir -p /tmp/vertex_corpus
          python an1_build_vertex_bundle.py --shards /tmp/vertex_corpus --upload-base "${{ env.UPLOAD_BASE }}"
