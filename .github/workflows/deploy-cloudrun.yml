# Deploy DAMA (topic search) and Dama AN RAG (Cloud Run dama-an1) on push to main.
# Vertex corpus (manifest + shards) is built by .github/workflows/build-vertex-corpus.yml — not here.
# Cloud Run uses AN1_VERTEX_MANIFEST_GCS_URI; AN1_VERTEX_BUNDLE_GCS_URI is optional fallback until manifest exists.
#
# Secrets: GCP_WIF_PROVIDER, GCP_WIF_SERVICE_ACCOUNT, DAMA_ACCESS_KEY (optional gate for DAMA only).
#
name: Deploy to Cloud Run (DAMA + AN1)

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  deploy-dama:
    name: DAMA (topic search)
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: dama-492316
      REGION: us-central1
      SERVICE: dama
      AR_REPO: dama
      IMAGE: dama
      DAMA_DATA_GCS_URI: gs://dama-492316-an-data-9690/data/an/
      DAMA_MAX_OUTPUT_TOKENS: "1024"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and push image
        run: |
          IMAGE_URI="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:${{ github.sha }}"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --image "$IMAGE_URI" \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --allow-unauthenticated \
            --set-env-vars "DAMA_USE_VERTEX=1,GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }},GOOGLE_CLOUD_REGION=${{ env.REGION }},DAMA_DATA_GCS_URI=${{ env.DAMA_DATA_GCS_URI }},DAMA_MAX_OUTPUT_TOKENS=${{ env.DAMA_MAX_OUTPUT_TOKENS }},DAMA_ACCESS_KEY=${{ secrets.DAMA_ACCESS_KEY }}" \
            --quiet

  deploy-an1:
    name: AN1 (Vertex RAG)
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: dama-492316
      REGION: us-central1
      SERVICE: dama-an1
      AR_REPO: dama
      IMAGE: dama-an1
      AN1_MANIFEST_GCS_URI: gs://dama-492316-an-data-9690/an1/vertex/manifest.json
      AN1_BUNDLE_GCS_URI: gs://dama-492316-an-data-9690/an1/an1_vertex_bundle.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and push AN1 image
        run: |
          IMAGE_URI="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:${{ github.sha }}"
          docker build -f Dockerfile.an1 -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Deploy AN1 to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --image "$IMAGE_URI" \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --timeout 300 \
            --set-env-vars "AN1_USE_VERTEX=1,GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }},GOOGLE_CLOUD_REGION=${{ env.REGION }},AN1_VERTEX_MANIFEST_GCS_URI=${{ env.AN1_MANIFEST_GCS_URI }},AN1_VERTEX_BUNDLE_GCS_URI=${{ env.AN1_BUNDLE_GCS_URI }},DAMA_VERTEX_MODEL=gemini-2.5-flash,DAMA_MAX_OUTPUT_TOKENS=2048,AN1_VERTEX_EMBEDDING_MODEL=text-embedding-005" \
            --quiet
